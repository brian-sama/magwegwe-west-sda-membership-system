server {
    listen 80;
    server_name members.magwegwewestsda.co.zw;

    # Root directory for the React frontend
    # Make sure to run `npm run build` and point this to the dist folder
    root /var/www/magwegwe-system/dist;
    index index.html index.htm;

    # Serve React app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Node.js backend
    location /api/ {
        # Rewrite the URL to remove /api/ if your Node backend doesn't expect it
        # Or keep it if your routes are defined with /api/ prefix
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
